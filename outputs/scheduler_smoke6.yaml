dataset_config: configs/dataset.yaml
scheduler_dataset_dir: data/scheduler_processed
classifier_output_dir: outputs/classifier
algorithm: dqn
episode_count: 2
max_steps_per_episode: 200
train_event_window: 12000
valid_event_window: 6000
random_state: 42
ppo_hidden_dim: 128
gae_lambda: 0.95
ppo_clip_epsilon: 0.2
ppo_update_epochs: 4
ppo_mini_batch_size: 128
ppo_value_coef: 0.5
ppo_entropy_coef: 0.01
queue_capacity: 10000
service_rate: 128
starvation_threshold: 20
gamma: 0.99
learning_rate: 0.001
batch_size: 64
replay_capacity: 5000
target_update_interval: 20
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay: 0.995
reward_weights:
  high_priority_throughput: 1.0
  high_priority_delay_penalty: 0.08
  average_delay_penalty: 0.05
  starvation_penalty: 3.0
  deadline_miss_penalty: 2.0
  aging_starvation_bonus: 3.0
  aging_balancing_bonus: 1.0
  aging_high_priority_penalty: 3.0
  strict_under_starvation_penalty: 2.0
  fifo_mixed_pressure_penalty: 2.5
  low_priority_service_bonus: 1.0
  low_queue_reduction_bonus: 0.75
output_dir: outputs/scheduler_smoke6
