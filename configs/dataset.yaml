data_path: data/processed/cdc_events_200k_from_oct2019.csv
target: priority_label
categorical_columns:
  - event_type
  - table_name
  - business_domain
  - source_service
  - user_level
numeric_columns:
  - record_size
  - changed_columns_count
  - estimated_sync_cost
  - business_value
  - consistency_risk
  - dependency_count
  - queue_wait_time
  - deadline
  - retry_count
  - source_load
  - db_load
  - is_peak_hour
  - is_hot_data
split:
  train: 0.7
  valid: 0.15
  test: 0.15
labeling:
  priority_score:
    components:
      business_importance:
        weight: 0.40
        numeric_weights:
          business_value: 0.75
        categorical_weights:
          business_domain: 0.15
          user_level: 0.10
        invert_numeric: []
        hot_values:
          business_domain:
            - ELECTRONICS
            - COMPUTERS
            - APPLIANCES
          user_level:
            - VIP
            - INTERNAL
      timeliness:
        weight: 0.30
        numeric_weights:
          queue_wait_time: 0.45
          deadline_gap: 0.35
          retry_count: 0.10
          is_peak_hour: 0.10
        invert_numeric:
          - deadline_gap
        categorical_weights: {}
        hot_values: {}
      dependency_impact:
        weight: 0.20
        numeric_weights:
          dependency_count: 0.60
          consistency_risk: 0.40
        categorical_weights:
          event_type: 1.0
        invert_numeric: []
        hot_values:
          event_type:
            - PURCHASE
            - CART
      execution_feasibility:
        weight: 0.10
        numeric_weights:
          estimated_sync_cost: 0.70
          source_load: 0.15
          db_load: 0.15
        invert_numeric:
          - estimated_sync_cost
          - source_load
          - db_load
        categorical_weights: {}
        hot_values: {}
    thresholds:
      medium: 0.34
      high: 0.50
