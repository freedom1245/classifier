dataset_config: configs/dataset.yaml
scheduler_dataset_dir: data/scheduler_processed
classifier_output_dir: outputs/classifier
algorithm: double_dqn
episode_count: 40
max_steps_per_episode: 1500
train_event_window: 12000
valid_event_window: 6000
random_state: 42
selection_reward_tolerance: 1000.0
selection_high_delay_tolerance: 250.0
selection_fairness_tolerance: 0.0001
queue_capacity: 10000
service_rate: 128
starvation_threshold: 20
defer_low_priority: true
low_release_batch_size: 16
low_release_load_threshold: 0.35
low_release_high_queue_threshold: 8
low_force_release_wait_steps: 600
off_peak_start_hour: 0
off_peak_end_hour: 6
gamma: 0.99
learning_rate: 0.001
batch_size: 64
replay_capacity: 5000
target_update_interval: 20
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay: 0.995
reward_weights:
  throughput_weight: 1.0
  delay_weight: 0.1
  fairness_weight: 0.5
  deferred_low_weight: 0.05
  off_peak_release_weight: 0.1
  deadline_weight: 2.0
output_dir: outputs/scheduler_double_dqn
