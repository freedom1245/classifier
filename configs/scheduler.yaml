queue_capacity: 10000
service_rate: 128
starvation_threshold: 20
gamma: 0.99
learning_rate: 0.001
batch_size: 64
replay_capacity: 5000
target_update_interval: 20
epsilon_start: 1.0
epsilon_end: 0.05
epsilon_decay: 0.995
reward_weights:
  throughput_weight: 1.0
  delay_weight: 0.1
  fairness_weight: 0.5
  deadline_weight: 2.0
output_dir: outputs/scheduler
